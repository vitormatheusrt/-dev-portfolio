<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearFin - Acesso Seguro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            --primary: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-gradient); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        
        .logo { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 20px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: #f8fafc; padding: 5px; border-radius: 30px; }
        .tab { flex: 1; padding: 10px; border: none; background: transparent; font-weight: bold; color: #64748b; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        .tab.active { background: white; color: var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        .form-view { display: none; animation: fadeIn 0.3s ease; text-align: left; }
        .form-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; display: block; color: var(--text-main); }
        input { width: 100%; padding: 14px; margin-bottom: 20px; border: 2px solid var(--border-color); border-radius: 12px; font-size: 1rem; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }
        
        button.btn-submit { width: 100%; padding: 15px; background: var(--primary-gradient); color: white; border: none; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(59, 130, 246, 0.3); }

        .erro { background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; font-weight: bold; text-align: center; }
        
        /* Caixa de instrução */
        .info-box { background-color: #fef3c7; border: 1px solid #f59e0b; color: #92400e; padding: 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; margin-bottom: 20px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">✨ ClearFin</div>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div style="background-color: #ffcccc; color: #cc0000; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; font-weight: bold;">
              {% for message in messages %}
                {{ message }}
              {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Entrar</button>
            <button class="tab" onclick="switchTab('cadastro')">Criar Conta</button>
        </div>

        <!-- FORM: LOGIN -->
       <form id="form-login" class="form-view active" action="/login" method="POST" autocomplete="off">
            <div class="info-box">
            💡 <b>Atenção:</b> Para entrar, utilize o seu <b>Nome de Login</b> criado no cadastro.
            </div>

            <label>Nome de Login</label>
            <input type="text" name="log_usuario" required placeholder="Ex: joao_dev" autocomplete="chrome-off">
        
            <label>Senha</label>
            <input type="password" name="log_senha" required placeholder="••••••••" autocomplete="chrome-off">
        
            <button type="submit" class="btn-submit">Acessar Painel</button>
        </form>

        <!-- FORM: CADASTRO -->
        <form id="form-cadastro" class="form-view" action="/cadastro" method="POST" autocomplete="off">
            <label>Como o site deve te chamar? (Nome de Exibição)</label>
            <input type="text" name="cad_nome" required placeholder="Ex: João Silva" autocomplete="chrome-off">

            <label>Nome de Login (Usado estritamente para entrar)</label>
            <input type="text" name="cad_usuario" required placeholder="Ex: joao_dev (sem espaços)" autocomplete="chrome-off">
        
            <label>Crie uma Senha Forte</label>
            <input type="password" name="cad_senha" required placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        
            <button type="submit" class="btn-submit">Criar Conta Grátis</button>
        </form>
    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-view').forEach(f => f.classList.remove('active'));
            
            if (tabName === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('form-login').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('form-cadastro').classList.add('active');
            }
        }
    </script>
</body>
</html>
